name: aqueduct-harvest

# Runs the aqueduct corpus harvest on GitHub Actions instead of the Contabo VPS
# (the VPS build kept OOMing; Lightning drained free credits). Daily cadence —
# the corpus is saturated, so daily is plenty and fits the 2000-min/mo quota.
# State (data/: raw + warehouse) is stored as a single state.tgz archive on
# OneDrive and pulled/pushed via rclone — one object instead of ~2k small files,
# whose per-file Graph API overhead otherwise blew the 30-min job cap.
on:
  workflow_dispatch:
    inputs:
      limit:
        description: per-source page size
        default: '15'
  schedule:
    - cron: '0 5 * * *'   # daily 05:00 UTC

concurrency:
  group: aqueduct-harvest
  cancel-in-progress: true

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 120         # LSA rebuild over the whole corpus is fast (~minutes on
                                 # 2 CPUs); this is ample headroom for that. (Was 350 for a
                                 # PubMedBERT dense re-embed that could never finish in CI —
                                 # see below.) Bumped 60 -> 120: the fetch phase itself now
                                 # walks 270+ queries (topics.json + suggest's auto-generated
                                 # companion file keeps growing it), which alone can exceed 60
                                 # min — that's what killed the run on 2026-07-20.
    env:
      LIMIT: ${{ github.event.inputs.limit || '15' }}
      NCBI_EMAIL: work@supercriticalbooks.com
      OPENALEX_MAILTO: work@supercriticalbooks.com
      # LSA (TF-IDF -> SVD): keyless, no model download, rebuilds fully but fast. The
      # PubMedBERT dense backend ('st') exceeded the CI CPU budget — the one-time seed
      # embed of ~146k chunks never fit in 350 min, so state was never pushed.
      AQUEDUCT_EMBED_BACKEND: lsa
      AQUEDUCT_DB_MEMORY_LIMIT: 4GB
      AQUEDUCT_DB_THREADS: '2'
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      AQUEDUCT_EMAIL_TO: ${{ secrets.AQUEDUCT_EMAIL_TO }}
      # DeepSeek (real HTTP API) so the daily report writes an LLM strategy memo
      # instead of a facts-only dump. Model MUST be a real deepseek.com id
      # (deepseek-chat) — the default 'deepseek-v4-pro' is a local proxy alias that
      # 404s against api.deepseek.com.
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_BASE_URL: https://api.deepseek.com/anthropic
      DEEPSEEK_MODEL: deepseek-chat
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install rclone (latest) + package
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash
          rclone version
          python -m pip install -U pip
          pip install -e .
      - name: Restore secrets (rclone config + topics)
        env:
          RCLONE_CONF: ${{ secrets.RCLONE_CONF }}
          AQUEDUCT_TOPICS: ${{ secrets.AQUEDUCT_TOPICS }}
        run: |
          mkdir -p ~/.config/rclone
          printf '%s' "$RCLONE_CONF" > ~/.config/rclone/rclone.conf
          printf '%s' "$AQUEDUCT_TOPICS" > topics.json
          chmod 600 ~/.config/rclone/rclone.conf
      - name: Pull corpus state from OneDrive
        run: |
          mkdir -p data
          if rclone copyto onedrive:aqueduct-state/state.tgz state.tgz --onedrive-chunk-size 100M --stats 30s; then
            tar -xzf state.tgz -C data && rm -f state.tgz
          else
            echo "No state.tgz on OneDrive yet — starting from an empty data/"
          fi
          du -sh data 2>/dev/null || true
      - name: Harvest (fetch + build)
        env:
          PYTHONUNBUFFERED: '1'  # else stdout is block-buffered (not a tty) and the Actions
                                 # log looks stuck for many minutes at a time, hiding real
                                 # progress and making a genuine hang indistinguishable from
                                 # slow-but-fine — as happened diagnosing the 2026-07-20 timeout.
        run: python -m aqueduct harvest --topics topics.json --limit "$LIMIT"
      - name: Daily report email (best-effort)
        continue-on-error: true
        run: |
          # `report` writes the markdown to data/reports/<stamp>_landscape.md and only
          # LOGS the path to stdout — so email the generated FILE, not stdout (which
          # previously sent just the one-line "[report] ... -> path" log message).
          python -m aqueduct report || true
          REPORT=$(ls -t data/reports/*.md 2>/dev/null | head -1)
          echo "emailing report file: ${REPORT:-<none>}"
          if [ -n "$RESEND_API_KEY" ] && [ -n "$AQUEDUCT_EMAIL_TO" ] && [ -s "$REPORT" ]; then
            REPORT="$REPORT" python3 -c "import json,os;print(json.dumps({'from':'Aqueduct <onboarding@resend.dev>','to':['$AQUEDUCT_EMAIL_TO'],'subject':'\U0001F4DA Aqueduct daily corpus report','text':open(os.environ['REPORT']).read()[:90000]}))" > /tmp/r.json
            curl -s -X POST https://api.resend.com/emails -H "Authorization: Bearer $RESEND_API_KEY" \
                 -H "Content-Type: application/json" \
                 -A "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/120 Safari/537.36" \
                 --data @/tmp/r.json >/dev/null || true
          fi
      - name: Publish latest memo for consumers (Pardalos research desk)
        continue-on-error: true
        run: |
          REPORT=$(ls -t data/reports/*.md 2>/dev/null | head -1)
          if [ -s "$REPORT" ]; then
            rclone copyto "$REPORT" onedrive:aqueduct-state/latest_report.md --stats=0
            echo "published $REPORT -> onedrive:aqueduct-state/latest_report.md"
          fi
      - name: Push updated corpus state to OneDrive
        run: |
          tar -czf state.tgz -C data --exclude='*.wal' .
          rclone copyto state.tgz onedrive:aqueduct-state/state.tgz --onedrive-chunk-size 100M --stats 30s
